<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raga Aur Taal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #141414;
            color: #fff;
            text-align: center;
            padding: 0;
            margin: 0;
        }
        /* The banner section using your wallpaper */
        header {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('Desktop wallpaper.png');
            background-size: cover;
            background-position: center;
            padding: 60px 20px;
            border-bottom: 4px solid #d4af37; /* Elegant gold accent border */
        }
        /* Your logo style */
        .logo {
            max-width: 180px;
            height: auto;
            border-radius: 50%; /* Makes the logo circular if you prefer, remove this line if you want it square */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            background-color: white; /* Ensures the white background logo pops */
            padding: 5px;
        }
        h1 {
            margin: 10px 0 0 0;
            font-size: 2.8rem;
            color: #fff;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }
        .tagline {
            color: #d4af37;
            font-size: 1.3rem;
            margin-top: 5px;
            font-style: italic;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            margin: 30px 0;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            border: 1px solid #333;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .btn {
            display: inline-block;
            background-color: #ff4500; /* YouTube Red/Orange */
            color: white;
            padding: 14px 28px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(255, 69, 0, 0.3);
        }
        .btn:hover {
            background-color: #e03d00;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 69, 0, 0.4);
        }
    </style>
</head>
<body>

    <header>
        <img src="White background logo.png" alt="Raga Aur Taal Logo" class="logo">
        <h1>Raga Aur Taal</h1>
        <div class="tagline">Exploring the melody of Ragas and the rhythm of Taals</div>
    </header>

    <div class="container">
        <h2>Featured Video</h2>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
        </div>

        <p>Welcome to our official platform. Stay tuned for upcoming music tutorials, performances, and deep dives into classical rhythms.</p>
        <br>
        <a href="https://www.youtube.com" target="_blank" class="btn">Subscribe on YouTube</a>
    </div>

</body>
</html>
